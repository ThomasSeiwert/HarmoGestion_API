spring.application.name=harmoGestionAPI
server.port=${HARMOGESTION_API_PORT}
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.datasource.url=jdbc:mysql://${HARMOGESTION_DB_HOST}:${HARMOGESTION_DB_PORT}/harmogestion
spring.datasource.username=${HARMOGESTION_DB_USERNAME}
spring.datasource.password=${HARMOGESTION_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl