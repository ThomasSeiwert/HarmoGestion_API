spring.application.name=harmoGestionAPI
server.port=9002
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.datasource.url=jdbc:mysql://localhost:3306/harmogestion
spring.datasource.username=${HARMOGESTION_DB_USERNAME}
spring.datasource.password=${HARMOGESTION_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl