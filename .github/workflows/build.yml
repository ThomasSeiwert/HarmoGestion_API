name: CI/CD
run-name: ${{ github.actor }} is testing CI/CD
on:
  push:
    branches:
      - main
jobs:

  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    env:
      HARMOGESTION_DB_NAME: ${{ secrets.DB_NAME }}
      HARMOGESTION_DB_USERNAME: ${{ secrets.DB_USERNAME }}
      HARMOGESTION_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      HARMOGESTION_DB_HOST: ${{ secrets.DB_HOST }}
      HARMOGESTION_DB_PORT: ${{ secrets.DB_PORT }}
      HARMOGESTION_API_PORT: ${{ secrets.API_PORT }}
    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Wait for MySQL to be ready
        run: |
          while ! mysqladmin ping -h"$HARMOGESTION_DB_HOST" -P"$HARMOGESTION_DB_PORT" --silent; do
            sleep 1
          done
      - name: Create DB from script
        run: mysql --host $HARMOGESTION_DB_HOST --port $HARMOGESTION_DB_PORT -u$HARMOGESTION_DB_USERNAME -p$HARMOGESTION_DB_PASSWORD $HARMOGESTION_DB_NAME < scripts/ScriptCreationBDD.sql
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'zulu' # Alternative distribution options are available.
      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=ThomasSeiwert_HarmoGestion_API
      - name: Generate Allure Report
        if: always()
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.ALLURE_REPORT_TOKEN }}
          publish_dir: target/site/allure-maven
          destination_dir: allure-results
          keep_files: false
      - name: Charging artefact
        uses: actions/upload-artifact@v7
        with:
          name: package
          path: target/*.jar
          overwrite: true
          retention-days: 1

  docker-build-image:
    if: ${{ github.ref == 'refs/heads/main' }}
    name: Docker build and deploy image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Connect to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: package
      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/harmogestion-api:latest